<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Sistema Fenrir</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:monospace;
margin:0;
}

header{
background:#111;
padding:20px;
text-align:center;
border-bottom:2px solid red;
}

.logo{
width:140px;
}

.tabs{
display:flex;
background:#1a1a1a;
}

.tabs button{
flex:1;
padding:15px;
background:#1a1a1a;
color:white;
border:none;
cursor:pointer;
}

.tabs button:hover{
background:#333;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
background:#222;
color:white;
border:none;
}

button.action{
background:#b00000;
padding:10px;
border:none;
margin-top:10px;
cursor:pointer;
color:white;
}

.tab{
display:none;
}

.cupom{
background:black;
padding:15px;
margin-top:20px;
white-space:pre-line;
}

.sugestao{
color:#00ff9c;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">
<h2>SISTEMA FENRIR</h2>

</header>

<div class="tabs">

<button onclick="openTab('pedidos')">Pedidos</button>
<button onclick="openTab('historico')">Histórico</button>
<button onclick="openTab('dashboard')">Dashboard</button>
<button onclick="openTab('ranking')">Ranking</button>
<button onclick="openTab('encomendas')">Encomendas</button>

</div>

<div class="container">

<!-- PEDIDOS -->

<div id="pedidos" class="tab">

<h3>Novo Pedido</h3>

Contato
<input id="contato">

Arma
<select id="arma">
<option>Colt 1911</option>
<option>HK USP</option>
<option>Desert Eagle</option>
</select>

Quantidade
<input id="qtd" type="number">

Pagamento
<select id="pagamento">
<option>Limpo</option>
<option>Sujo</option>
</select>

<button class="action" onclick="gerarPedido()">Gerar Cupom</button>
<button class="action" onclick="copiarCupom()">Copiar Cupom</button>

<div id="cupom" class="cupom"></div>

</div>

<!-- HISTORICO -->

<div id="historico" class="tab">
<h3>Histórico</h3>
<div id="listaHistorico"></div>
</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tab">
<h3>Dashboard</h3>
<div id="relatorio"></div>
</div>

<!-- RANKING -->

<div id="ranking" class="tab">
<h3>Ranking Clientes</h3>
<div id="rankingClientes"></div>
</div>

<!-- ENCOMENDAS -->

<div id="encomendas" class="tab">

<h3>Nova Encomenda</h3>

Categoria
<select id="categoria" onchange="carregarProdutos()">
<option value="">Selecionar</option>
<option value="municoes">Munições</option>
<option value="drogas">Drogas</option>
</select>

Produto
<select id="produto" onchange="carregarFornecedores()"></select>

Fornecedor
<select id="orgCompra" onchange="preencherValores()"></select>

Quantidade
<input id="qtdCompra" type="number">

Tipo de pagamento
<select id="tipoPagamento">
<option value="limpo">Dinheiro Limpo</option>
<option value="sujo">Dinheiro Sujo</option>
</select>

Valor Limpo
<input id="precoLimpo" readonly>

Valor Sujo
<input id="precoSujo" readonly>

Observação
<input id="obsCompra" readonly>

<div id="fornecedorBarato" class="sugestao"></div>

<button class="action" onclick="gerarCompra()">Gerar Encomenda</button>
<button class="action" onclick="copiarCupomCompra()">Copiar Encomenda</button>

<div id="cupomCompra" class="cupom"></div>

</div>

</div>

<script>

/* CONTROLE DE ABAS */

function openTab(tabId){

let tabs=document.querySelectorAll(".tab")

tabs.forEach(tab=>{
tab.style.display="none"
})

document.getElementById(tabId).style.display="block"

}

window.onload=function(){
openTab("pedidos")
}

/* GERAR PEDIDO */

function gerarPedido(){

let contato=document.getElementById("contato").value
let arma=document.getElementById("arma").value
let qtd=document.getElementById("qtd").value
let pagamento=document.getElementById("pagamento").value

if(!contato || !qtd){
alert("Preencha contato e quantidade")
return
}

let cupom=

`PEDIDO

Cliente: ${contato}

Arma: ${arma}

Quantidade: ${qtd}

Pagamento: ${pagamento}

Status: AGUARDANDO ENTREGA
`

document.getElementById("cupom").innerText=cupom

}

function copiarCupom(){

let texto=document.getElementById("cupom").innerText

if(!texto){
alert("Nenhum cupom gerado")
return
}

navigator.clipboard.writeText(texto)
alert("Cupom copiado!")

}

/* BANCO DE DADOS */

const tabelaCompras={

municoes:{
"9mm ou .45":{
"NINE":{limpo:25,sujo:0,obs:"Pedido Min 1000 Munição"},
"FAMILIA CESARINE":{limpo:20,sujo:40,obs:""}
},

".50 e Doze":{
"NINE":{limpo:30,sujo:0,obs:""},
"FAMILIA CESARINE":{limpo:25,sujo:50,obs:""}
},

"762":{
"NINE":{limpo:30,sujo:0,obs:""},
"FAMILIA CESARINE":{limpo:30,sujo:60,obs:""}
}

},

drogas:{

"Coca":{
"FAMILIES":{limpo:230,sujo:460,obs:"Venda média 280 a 290"},
"THUNDERS":{limpo:300,sujo:460,obs:"Venda média 280 a 290"},
"DVD":{limpo:230,sujo:460,obs:""},
"CLOUND":{limpo:230,sujo:460,obs:""},
"OG's":{limpo:230,sujo:380,obs:"Venda média 290 a 300"}
},

"Meta":{
"FAMILIES":{limpo:230,sujo:500,obs:"Venda média 315"},
"BALLAS":{limpo:230,sujo:460,obs:""}
},

"LSD":{
"DVD":{limpo:230,sujo:500,obs:""},
"CLOUND":{limpo:230,sujo:460,obs:""},
"OG's":{limpo:230,sujo:380,obs:"Venda média 290 a 300"}
}

}

}

/* CARREGAR PRODUTOS */

function carregarProdutos(){

let categoria=document.getElementById("categoria").value
let produtoSelect=document.getElementById("produto")
let orgSelect=document.getElementById("orgCompra")

produtoSelect.innerHTML=""
orgSelect.innerHTML=""

if(!categoria) return

produtoSelect.innerHTML='<option value="">Selecionar</option>'

Object.keys(tabelaCompras[categoria]).forEach(prod=>{
produtoSelect.innerHTML+=`<option>${prod}</option>`
})

}

/* CARREGAR FORNECEDORES */

function carregarFornecedores(){

let categoria=document.getElementById("categoria").value
let produto=document.getElementById("produto").value
let orgSelect=document.getElementById("orgCompra")

orgSelect.innerHTML=""

if(!categoria||!produto) return

let fornecedores=tabelaCompras[categoria][produto]

orgSelect.innerHTML='<option value="">Selecionar</option>'

Object.keys(fornecedores).forEach(org=>{
orgSelect.innerHTML+=`<option>${org}</option>`
})

}

/* PREENCHER VALORES */

function preencherValores(){

let categoria=document.getElementById("categoria").value
let produto=document.getElementById("produto").value
let org=document.getElementById("orgCompra").value

if(!categoria||!produto||!org) return

let dados=tabelaCompras[categoria][produto][org]

document.getElementById("precoLimpo").value=dados.limpo
document.getElementById("precoSujo").value=dados.sujo
document.getElementById("obsCompra").value=dados.obs

sugerirFornecedorMaisBarato(categoria,produto)

}

/* SUGESTÃO FORNECEDOR */

function sugerirFornecedorMaisBarato(categoria,produto){

let fornecedores=tabelaCompras[categoria][produto]

let maisBarato=null
let menor=999999

for(let org in fornecedores){

let preco=fornecedores[org].limpo

if(preco<menor){
menor=preco
maisBarato=org
}

}

document.getElementById("fornecedorBarato").innerText=
`Fornecedor mais barato: ${maisBarato} ($${menor})`

}

/* GERAR ENCOMENDA */

function gerarCompra(){

let produto=document.getElementById("produto").value
let org=document.getElementById("orgCompra").value
let qtd=document.getElementById("qtdCompra").value
let tipo=document.getElementById("tipoPagamento").value

let preco= tipo=="limpo"
? document.getElementById("precoLimpo").value
: document.getElementById("precoSujo").value

let total=qtd*preco

let cupom=

`ENCOMENDA

Produto: ${produto}

Fornecedor: ${org}

Quantidade: ${qtd}

Pagamento: ${tipo}

Valor unitário: $${preco}

Total: $${total}
`

document.getElementById("cupomCompra").innerText=cupom

}

function copiarCupomCompra(){

let texto=document.getElementById("cupomCompra").innerText

if(!texto){
alert("Nenhuma encomenda gerada")
return
}

navigator.clipboard.writeText(texto)
alert("Encomenda copiada!")

}

</script>

</body>
</html>
