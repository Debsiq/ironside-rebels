<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Sistema Fenrir</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:monospace;
margin:0;
}

header{
background:#111;
padding:20px;
text-align:center;
}

.logo{
width:140px;
}

.tabs{
display:flex;
background:#1a1a1a;
}

.tabs button{
flex:1;
padding:15px;
background:#1a1a1a;
color:white;
border:none;
cursor:pointer;
}

.tabs button:hover{
background:#333;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
background:#222;
color:white;
border:none;
}

button.action{
background:#b00000;
padding:10px;
border:none;
margin-top:10px;
cursor:pointer;
}

.tab{
display:none;
}

.cupom{
background:black;
padding:15px;
margin-top:20px;
white-space:pre-line;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">
<h2>SISTEMA FENRIR</h2>

</header>

<div class="tabs">

<button onclick="openTab('pedidos')">Pedidos</button>
<button onclick="openTab('historico')">Histórico</button>
<button onclick="openTab('dashboard')">Dashboard</button>
<button onclick="openTab('ranking')">Ranking</button>
<button onclick="openTab('encomendas')">Encomendas</button>

</div>

<div class="container">

<div id="pedidos" class="tab">

<h3>Novo Pedido</h3>

Contato
<input id="contato">

Organização
<input id="org" value="OG's">

Arma
<select id="arma">

<option>Colt 1911</option>
<option>HK USP</option>
<option>Desert Eagle</option>

</select>

Quantidade
<input id="qtd" type="number">

Pagamento
<select id="pagamento">
<option>Limpo</option>
<option>Sujo</option>
</select>

<button class="action" onclick="gerarPedido()">Gerar Cupom</button>

<div id="cupom" class="cupom"></div>

</div>

<div id="historico" class="tab">
<h3>Histórico</h3>
<div id="listaHistorico"></div>
</div>

<div id="dashboard" class="tab">
<h3>Relatório</h3>
<div id="relatorio"></div>
</div>

<div id="ranking" class="tab">
<h3>Ranking Clientes</h3>
<div id="rankingClientes"></div>
</div>

<div id="encomendas" class="tab">

<h3>Nova Encomenda</h3>

Produto
<input id="produtoCompra">

Organização
<input id="orgCompra">

Quantidade
<input id="qtdCompra">

Preço unitário
<input id="precoCompra">

<button class="action" onclick="gerarCompra()">Registrar Compra</button>

<div id="cupomCompra" class="cupom"></div>

</div>

</div>

<script>

let vendas = JSON.parse(localStorage.getItem("fenrir_vendas")) || []

function openTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.style.display="none")
document.getElementById(tab).style.display="block"

if(tab=="ranking") gerarRanking()

}

openTab("pedidos")

function gerarPedido(){

let contato=document.getElementById("contato").value
let arma=document.getElementById("arma").value
let qtd=Number(document.getElementById("qtd").value)
let pagamento=document.getElementById("pagamento").value

let precos={
"Colt 1911":{limpo:10000,sujo:12500},
"HK USP":{limpo:12000,sujo:15000},
"Desert Eagle":{limpo:14000,sujo:17500}
}

let preco = pagamento=="Limpo" ? precos[arma].limpo : precos[arma].sujo

let total=qtd*preco

if(qtd>=11){
total=total*0.9
}

let numero=vendas.length+1

let cupom=

`VENDA #${String(numero).padStart(4,'0')}

Contato: ${contato}

Pedido:
${qtd} ${arma}

Total: $${Math.round(total)}`

document.getElementById("cupom").innerText=cupom

vendas.push({numero,contato,arma,qtd,total})

localStorage.setItem("fenrir_vendas",JSON.stringify(vendas))

}

function gerarRanking(){

let ranking={}

vendas.forEach(v=>{

if(!ranking[v.contato]) ranking[v.contato]=0
ranking[v.contato]+=v.total

})

let lista=Object.entries(ranking)
.sort((a,b)=>b[1]-a[1])

let div=document.getElementById("rankingClientes")

div.innerHTML=""

lista.forEach((c,i)=>{

div.innerHTML+=`<div>${i+1}º ${c[0]} — $${c[1]}</div>`

})

}

</script>

</body>

</html>
