<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Sistema Fenrir</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:monospace;
margin:0;
}

header{
background:#111;
padding:20px;
text-align:center;
border-bottom:2px solid red;
}

.logo{
width:140px;
}

.tabs{
display:flex;
background:#1a1a1a;
}

.tabs button{
flex:1;
padding:15px;
background:#1a1a1a;
color:white;
border:none;
cursor:pointer;
}

.tabs button:hover{
background:#333;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
background:#222;
color:white;
border:none;
}

button.action{
background:#b00000;
padding:10px;
border:none;
margin-top:10px;
cursor:pointer;
color:white;
}

.tab{
display:none;
}

.cupom{
background:black;
padding:15px;
margin-top:20px;
white-space:pre-line;
}

.history{
background:#1b1b1b;
padding:10px;
margin:5px 0;
}

.sugestao{
color:#00ff9c;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h2>SISTEMA FENRIR</h2>
</header>

<div class="tabs">
<button onclick="openTab('pedidos')">Pedidos</button>
<button onclick="openTab('historico')">Histórico</button>
<button onclick="openTab('dashboard')">Dashboard</button>
<button onclick="openTab('ranking')">Ranking</button>
<button onclick="openTab('encomendas')">Encomendas</button>
</div>

<div class="container">

<!-- PEDIDOS -->

<div id="pedidos" class="tab">

<h3>Novo Pedido</h3>

Contato
<input id="contato">

Arma
<select id="arma">
<option>Colt 1911</option>
<option>HK USP</option>
<option>Desert Eagle</option>
</select>

Quantidade
<input id="qtd" type="number">

Pagamento
<select id="pagamento">
<option>Limpo</option>
<option>Sujo</option>
</select>

<button class="action" onclick="gerarPedido()">Gerar Cupom</button>
<button class="action" onclick="copiarCupom()">Copiar Cupom</button>

<div id="cupom" class="cupom"></div>

</div>

<!-- HISTORICO -->

<div id="historico" class="tab">
<h3>Histórico</h3>
<div id="listaHistorico"></div>
</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tab">
<h3>Dashboard</h3>
<div id="relatorio"></div>
</div>

<!-- RANKING -->

<div id="ranking" class="tab">
<h3>Ranking Clientes</h3>
<div id="rankingClientes"></div>
</div>

<!-- ENCOMENDAS -->

<div id="encomendas" class="tab">

<h3>Nova Encomenda</h3>

Categoria
<select id="categoria" onchange="carregarProdutos()">
<option value="">Selecionar</option>
<option value="municoes">Munições</option>
<option value="drogas">Drogas</option>
</select>

Produto
<select id="produto" onchange="carregarFornecedores()"></select>

Fornecedor
<select id="orgCompra" onchange="preencherValores()"></select>

Quantidade
<input id="qtdCompra" type="number">

Tipo de pagamento
<select id="tipoPagamento">
<option value="limpo">Dinheiro Limpo</option>
<option value="sujo">Dinheiro Sujo</option>
</select>

Valor Limpo
<input id="precoLimpo" readonly>

Valor Sujo
<input id="precoSujo" readonly>

Observação
<input id="obsCompra" readonly>

<div id="fornecedorBarato" class="sugestao"></div>

<button class="action" onclick="gerarCompra()">Gerar Encomenda</button>
<button class="action" onclick="copiarCupomCompra()">Copiar Encomenda</button>

<div id="cupomCompra" class="cupom"></div>

</div>

</div>

<script>

/* ABAS */

function openTab(tab){
document.querySelectorAll(".tab").forEach(t=>t.style.display="none")
document.getElementById(tab).style.display="block"
}

window.onload=()=>{
openTab("pedidos")
carregarHistorico()
}

/* HISTORICO */

let historico=JSON.parse(localStorage.getItem("fenrirHistorico"))||[]

function salvarHistorico(){
localStorage.setItem("fenrirHistorico",JSON.stringify(historico))
carregarHistorico()
}

function carregarHistorico(){

let div=document.getElementById("listaHistorico")
div.innerHTML=""

historico.forEach((p,i)=>{

div.innerHTML+=`
<div class="history">
${p}
<br>
<button onclick="excluirHistorico(${i})">Excluir</button>
</div>
`

})

atualizarDashboard()
atualizarRanking()

}

function excluirHistorico(i){
historico.splice(i,1)
salvarHistorico()
}

/* PEDIDOS */

const armas={

"Colt 1911":{limpo:10000,sujo:12500,materiais:{cylinder:1,components:1,blueprint:1}},
"HK USP":{limpo:12000,sujo:15000,materiais:{cylinder:1,components:2,blueprint:1}},
"Desert Eagle":{limpo:14000,sujo:17500,materiais:{cylinder:2,components:1,blueprint:1}}

}

let vendas=JSON.parse(localStorage.getItem("fenrir_vendas"))||[]

function openTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.style.display="none")

document.getElementById(tab).style.display="block"

if(tab=="historico")carregarHistorico()
if(tab=="dashboard")calcularDashboard()
if(tab=="ranking")gerarRanking()

}

openTab("pedidos")

function calcularCarregamento(caixas){

let grande=Math.floor(caixas/15)
let resto=caixas%15

let medio=Math.floor(resto/10)
resto=resto%10

let pequeno=Math.ceil(resto/5)

return{grande,medio,pequeno}

}

function gerarPedido(){

let contato=document.getElementById("contato").value
let armaNome=document.getElementById("arma").value
let qtd=Number(document.getElementById("qtd").value)
let pagamento=document.getElementById("pagamento").value

let arma=armas[armaNome]

let preco=pagamento=="Limpo"?arma.limpo:arma.sujo

let total=qtd*preco

let desconto=false

if(qtd>=11){
total=total*0.9
desconto=true
}

let cylinder=qtd*arma.materiais.cylinder
let components=qtd*arma.materiais.components
let blueprint=qtd*arma.materiais.blueprint

let caixas=Math.max(cylinder,components,blueprint)

let carreg=calcularCarregamento(caixas)

let custoLimpo=
carreg.grande*80000+
carreg.medio*60000+
carreg.pequeno*30000

let custoSujo=
carreg.grande*120000+
carreg.medio*90000+
carreg.pequeno*45000

let textoCarreg=""

if(carreg.grande>0)textoCarreg+=`${carreg.grande} Grande `
if(carreg.medio>0)textoCarreg+=`${carreg.medio} Médio `
if(carreg.pequeno>0)textoCarreg+=`${carreg.pequeno} Pequeno`

let numero=vendas.length+1

let data=new Date().toLocaleDateString()

let cupom=

`VENDA #${String(numero).padStart(4,'0')}

Contato: ${contato}
Data: ${data}
Tipo de Pagamento: Dinheiro ${pagamento}

Pedido:
${qtd} ${armaNome} → $${preco.toLocaleString()} (cada)

${desconto?"Desconto aplicado: 10%\n":""}

Total do Pedido: $${Math.round(total).toLocaleString()}

Materiais Necessários para Produção:

${cylinder} Cylinder
${components} Componente
${blueprint} Blueprint

Para atender o pedido o carregamento recomendado é ${textoCarreg}

Que custará $${custoLimpo.toLocaleString()} ou no Sujo: $${custoSujo.toLocaleString()}
`

document.getElementById("cupom").innerText=cupom

vendas.push({numero,contato,arma:armaNome,qtd,total})

localStorage.setItem("fenrir_vendas",JSON.stringify(vendas))

carregarHistorico()
calcularDashboard()
gerarRanking()

}
function gerarRanking(){

let ranking={}

vendas.forEach(v=>{

if(!ranking[v.contato])ranking[v.contato]=0

ranking[v.contato]+=v.total

})

let lista=Object.entries(ranking).sort((a,b)=>b[1]-a[1])

let div=document.getElementById("rankingClientes")

div.innerHTML=""

lista.forEach((c,i)=>{

div.innerHTML+=`<div>${i+1}º ${c[0]} — $${c[1].toLocaleString()}</div>`

})

}
function copiarCupom(){
navigator.clipboard.writeText(document.getElementById("cupom").innerText)
alert("Cupom copiado")
}

/* DASHBOARD */

function atualizarDashboard(){

let totalPedidos=historico.length
let totalArmas=0

historico.forEach(p=>{
let match=p.match(/Quantidade: (\d+)/)
if(match) totalArmas+=Number(match[1])
})

document.getElementById("relatorio").innerText=

`Total de pedidos: ${totalPedidos}

Total de armas vendidas: ${totalArmas}`

}

/* RANKING */

function atualizarRanking(){

let contagem={}

historico.forEach(p=>{

let match=p.match(/Cliente: (.*)/)

if(match){

let nome=match[1]

contagem[nome]=(contagem[nome]||0)+1

}

})

let lista=Object.entries(contagem)
.sort((a,b)=>b[1]-a[1])

let html=""

lista.forEach(c=>{

html+=`${c[0]} - ${c[1]} pedidos<br>`

})

document.getElementById("rankingClientes").innerHTML=html

}

/* BANCO ENCOMENDAS */

const tabelaCompras={
municoes:{
"9mm ou .45":{
"NINE":{limpo:25,sujo:0,obs:"Pedido Min 1000"},
"FAMILIA CESARINE":{limpo:20,sujo:40,obs:""}
}
},
drogas:{
"Coca":{
"FAMILIES":{limpo:230,sujo:460,obs:"Venda média 280"},
"OG's":{limpo:230,sujo:380,obs:""}
}
}
}

/* ENCOMENDAS */

function carregarProdutos(){

let cat=categoria.value
produto.innerHTML=""
orgCompra.innerHTML=""

if(!cat)return

Object.keys(tabelaCompras[cat]).forEach(p=>{
produto.innerHTML+=`<option>${p}</option>`
})

}

function carregarFornecedores(){

let cat=categoria.value
let prod=produto.value

orgCompra.innerHTML=""

Object.keys(tabelaCompras[cat][prod]).forEach(o=>{
orgCompra.innerHTML+=`<option>${o}</option>`
})

}

function preencherValores(){

let cat=categoria.value
let prod=produto.value
let org=orgCompra.value

let d=tabelaCompras[cat][prod][org]

precoLimpo.value=d.limpo
precoSujo.value=d.sujo
obsCompra.value=d.obs

}

function gerarCompra(){

let prod=produto.value
let org=orgCompra.value
let qtd=qtdCompra.value
let tipo=tipoPagamento.value

let preco=tipo=="limpo"?precoLimpo.value:precoSujo.value

let total=qtd*preco

let cupom=

`ENCOMENDA

Produto: ${prod}

Fornecedor: ${org}

Quantidade: ${qtd}

Pagamento: ${tipo}

Valor unitário: ${preco}

Total: ${total}`

cupomCompra.innerText=cupom

}

function copiarCupomCompra(){
navigator.clipboard.writeText(cupomCompra.innerText)
alert("Encomenda copiada")
}

</script>

</body>
</html>
