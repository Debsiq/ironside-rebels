<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fenrir - Sistema de Vendas</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
padding:20px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:10px;
}

h2{
margin-top:0;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:5px;
border:none;
}

button{
padding:10px;
background:#2ecc71;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

#cupom{
white-space:pre-line;
background:#000;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>🐺 Fenrir - Sistema de Vendas</h1>

<div class="container">

<div class="card">

<h2>Novo Pedido</h2>

<input id="contato" placeholder="Contato do cliente">

<select id="arma">
<option>Colt 1911</option>
<option>HK USP</option>
<option>Desert Eagle</option>
</select>

<input id="qtd" type="number" placeholder="Quantidade">

<select id="pagamento">
<option>Limpo</option>
<option>Sujo</option>
</select>

<button onclick="gerarPedido()">Gerar Pedido</button>

<div id="cupom"></div>

</div>

<div class="card">

<h2>Dashboard</h2>

<div id="relatorio"></div>

<h2>Ranking de Clientes</h2>

<div id="ranking"></div>

</div>

</div>

<div class="card">

<h2>Histórico de Pedidos</h2>

<div id="historico"></div>

</div>

<script>

let vendas = JSON.parse(localStorage.getItem("fenrir_vendas")) || []

const armas={

"Colt 1911":{
limpo:10000,
sujo:12500,
custo:5000,
materiais:{cylinder:1,components:1,blueprint:1}
},

"HK USP":{
limpo:12000,
sujo:15000,
custo:6000,
materiais:{cylinder:1,components:2,blueprint:1}
},

"Desert Eagle":{
limpo:14000,
sujo:17500,
custo:7000,
materiais:{cylinder:2,components:1,blueprint:1}
}

}

function calcularCarregamento(caixas){

let grande=Math.floor(caixas/15)
let resto=caixas%15

let medio=Math.floor(resto/10)
resto=resto%10

let pequeno=Math.ceil(resto/5)

return{grande,medio,pequeno}

}

function gerarPedido(){

let contato=document.getElementById("contato").value
let armaNome=document.getElementById("arma").value
let qtd=Number(document.getElementById("qtd").value)
let pagamento=document.getElementById("pagamento").value

let arma=armas[armaNome]

let preco=pagamento=="Limpo"?arma.limpo:arma.sujo

let total=qtd*preco

let desconto=false

if(qtd>=11){
total=total*0.9
desconto=true
}

let cylinder=qtd*arma.materiais.cylinder
let components=qtd*arma.materiais.components
let blueprint=qtd*arma.materiais.blueprint

let caixas=Math.max(cylinder,components,blueprint)

let carreg=calcularCarregamento(caixas)

let custoLimpo=
carreg.grande*80000+
carreg.medio*60000+
carreg.pequeno*30000

let custoSujo=
carreg.grande*120000+
carreg.medio*90000+
carreg.pequeno*45000

let textoCarreg=""

if(carreg.grande>0) textoCarreg+=carreg.grande+" Grande "
if(carreg.medio>0) textoCarreg+=carreg.medio+" Médio "
if(carreg.pequeno>0) textoCarreg+=carreg.pequeno+" Pequeno "

let custoTotal=qtd*arma.custo
let lucroPedido=total-custoTotal

let numero=vendas.length+1
let data=new Date().toLocaleDateString()

let cupom=

`VENDA #${String(numero).padStart(4,'0')}

Contato: ${contato}
Data: ${data}
Pagamento: ${pagamento}

Pedido:
${qtd} ${armaNome} → $${preco.toLocaleString()}

${desconto?"Desconto aplicado 10%\n":""}

Total do Pedido: $${Math.round(total).toLocaleString()}

Lucro deste pedido: $${lucroPedido.toLocaleString()}

Materiais Necessários para Produção:
${cylinder} Cylinder
${components} Componente
${blueprint} Blueprint

Para atender o pedido o carregamento recomendado é:

${textoCarreg}

Custará:
$${custoLimpo.toLocaleString()} (Limpo)
$${custoSujo.toLocaleString()} (Sujo)
`

document.getElementById("cupom").innerText=cupom

vendas.push({
numero,
contato,
arma:armaNome,
qtd,
total,
lucro:lucroPedido
})

localStorage.setItem("fenrir_vendas",JSON.stringify(vendas))

carregarHistorico()
calcularDashboard()
gerarRanking()

}

function carregarHistorico(){

let div=document.getElementById("historico")

div.innerHTML=""

vendas.forEach((v,i)=>{

div.innerHTML+=`

<div style="background:#111;padding:10px;margin:5px;border-radius:5px">

#${String(v.numero).padStart(4,'0')}
${v.contato} |
${v.arma} |
${v.qtd}

$${v.total.toLocaleString()}

<button onclick="excluirVenda(${i})">Excluir</button>

</div>

`

})

}

function excluirVenda(i){

vendas.splice(i,1)

localStorage.setItem("fenrir_vendas",JSON.stringify(vendas))

carregarHistorico()
calcularDashboard()
gerarRanking()

}

function calcularDashboard(){

let total=0
let lucroTotal=0

vendas.forEach(v=>{
total+=v.total
lucroTotal+=v.lucro
})

let ultimo=vendas[vendas.length-1]

let lucroUltimo=ultimo?ultimo.lucro:0

document.getElementById("relatorio").innerText=

`Total vendido: $${total.toLocaleString()}

Lucro total: $${lucroTotal.toLocaleString()}

Lucro do último pedido: $${lucroUltimo.toLocaleString()}

Pedidos realizados: ${vendas.length}`

}

function gerarRanking(){

let ranking={}

vendas.forEach(v=>{

if(!ranking[v.contato]) ranking[v.contato]=0

ranking[v.contato]+=v.total

})

let lista=Object.entries(ranking)
.sort((a,b)=>b[1]-a[1])

let div=document.getElementById("ranking")

div.innerHTML=""

lista.forEach(c=>{

div.innerHTML+=`<div>${c[0]} → $${c[1].toLocaleString()}</div>`

})

}

carregarHistorico()
calcularDashboard()
gerarRanking()

</script>

</body>
</html>
