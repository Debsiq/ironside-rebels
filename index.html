<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Fenrir</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      background:linear-gradient(180deg,#070707 0%, #0d0d0d 100%);
      color:white;
      font-family:monospace;
      margin:0;
    }

    header{
      background:#111;
      padding:20px;
      text-align:center;
      border-bottom:2px solid #b00000;
      box-shadow:0 0 20px rgba(176,0,0,.15);
    }

    .logo{
      width:140px;
      max-width:80%;
    }

    h2,h3{
      margin:10px 0;
    }

    .tabs{
      display:flex;
      flex-wrap:wrap;
      background:#151515;
      border-bottom:1px solid #2b2b2b;
    }

    .tabs button{
      flex:1;
      min-width:140px;
      padding:15px;
      background:#1a1a1a;
      color:white;
      border:none;
      cursor:pointer;
      transition:.2s;
      border-right:1px solid #2a2a2a;
      font-weight:bold;
    }

    .tabs button:hover,
    .tabs button.active{
      background:#2a0b0b;
      color:#ffb3b3;
    }

    .container{
      padding:20px;
      max-width:1000px;
      margin:auto;
    }

    .tab{
      display:none;
      animation:fade .2s ease;
    }

    @keyframes fade{
      from{opacity:0;transform:translateY(4px);}
      to{opacity:1;transform:translateY(0);}
    }

    .card{
      background:#121212;
      border:1px solid #242424;
      border-radius:12px;
      padding:18px;
      margin-bottom:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.22);
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:4px;
      color:#cfcfcf;
      font-size:14px;
    }

    input,select{
      width:100%;
      padding:10px 12px;
      margin:0;
      background:#202020;
      color:white;
      border:1px solid #333;
      border-radius:8px;
      outline:none;
    }

    input:focus,select:focus{
      border-color:#b00000;
      box-shadow:0 0 0 2px rgba(176,0,0,.2);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
    }

    button.action{
      background:#b00000;
      padding:11px 14px;
      border:none;
      margin-top:14px;
      margin-right:8px;
      cursor:pointer;
      color:white;
      border-radius:8px;
      font-weight:bold;
      transition:.2s;
    }

    button.action:hover{
      background:#d10a0a;
      transform:translateY(-1px);
    }

    button.small{
      background:#2a2a2a;
      padding:8px 10px;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    button.small:hover{
      background:#3a3a3a;
    }

    .cupom{
      background:#050505;
      border:1px solid #2e2e2e;
      border-left:4px solid #b00000;
      padding:15px;
      margin-top:20px;
      white-space:pre-line;
      border-radius:10px;
      min-height:70px;
    }

    .history{
      background:#1b1b1b;
      padding:14px;
      margin:8px 0;
      border-radius:10px;
      border:1px solid #2c2c2c;
    }

    .sugestao{
      color:#00ff9c;
      margin-top:12px;
      font-weight:bold;
    }

    .muted{
      color:#a8a8a8;
      font-size:13px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:14px;
      margin-top:14px;
    }

    .stat{
      background:#151515;
      border:1px solid #2a2a2a;
      border-radius:12px;
      padding:16px;
    }

    .stat .title{
      color:#bcbcbc;
      font-size:13px;
      margin-bottom:6px;
    }

    .stat .value{
      font-size:24px;
      font-weight:bold;
      color:#fff;
    }

    .divider{
      height:1px;
      background:#242424;
      margin:16px 0;
    }

    .warning{
      color:#ffd166;
      margin-top:10px;
      font-size:13px;
    }

    .ok{
      color:#00ff9c;
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" class="logo" alt="Logo Fenrir">
  <h2>SISTEMA FENRIR</h2>
</header>

<div class="tabs">
  <button data-tab="pedidos" onclick="openTab('pedidos', this)">Pedidos</button>
  <button data-tab="historico" onclick="openTab('historico', this)">Histórico</button>
  <button data-tab="dashboard" onclick="openTab('dashboard', this)">Dashboard</button>
  <button data-tab="ranking" onclick="openTab('ranking', this)">Ranking</button>
  <button data-tab="encomendas" onclick="openTab('encomendas', this)">Encomendas</button>
</div>

<div class="container">

  <!-- PEDIDOS -->
  <div id="pedidos" class="tab">
    <div class="card">
      <h3>Novo Pedido</h3>

      <label for="contato">Contato</label>
      <input id="contato" placeholder="Nome ou contato do cliente">

      <label for="arma">Arma</label>
      <select id="arma">
        <option>Colt 1911</option>
        <option>HK USP</option>
        <option>Desert Eagle</option>
      </select>

      <label for="qtd">Quantidade</label>
      <input id="qtd" type="number" min="1" placeholder="Ex: 5">

      <label for="pagamento">Pagamento</label>
      <select id="pagamento">
        <option>Limpo</option>
        <option>Sujo</option>
      </select>

      <button class="action" onclick="gerarPedido()">Gerar Cupom</button>
      <button class="action" onclick="copiarCupom()">Copiar Cupom</button>

      <div id="cupom" class="cupom"></div>
    </div>
  </div>

  <!-- HISTORICO -->
  <div id="historico" class="tab">
    <div class="card">
      <h3>Histórico</h3>
      <div id="listaHistorico"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="tab">
    <div class="card">
      <h3>Dashboard</h3>
      <div id="relatorio"></div>
    </div>
  </div>

  <!-- RANKING -->
  <div id="ranking" class="tab">
    <div class="card">
      <h3>Ranking Clientes</h3>
      <div id="rankingClientes"></div>
    </div>
  </div>

  <!-- ENCOMENDAS -->
  <div id="encomendas" class="tab">
    <div class="card">
      <h3>Nova Encomenda</h3>

      <div class="grid">
        <div>
          <label for="categoria">Categoria</label>
          <select id="categoria" onchange="carregarProdutos()">
            <option value="">Selecionar</option>
            <option value="municoes">Munições</option>
            <option value="drogas">Drogas</option>
          </select>
        </div>

        <div>
          <label for="produto">Produto</label>
          <select id="produto" onchange="carregarFornecedores()">
            <option value="">Selecione a categoria primeiro</option>
          </select>
        </div>

        <div>
          <label for="orgCompra">Fornecedor</label>
          <select id="orgCompra" onchange="preencherValores()">
            <option value="">Selecione o produto primeiro</option>
          </select>
        </div>

        <div>
          <label for="qtdCompra">Quantidade</label>
          <input id="qtdCompra" type="number" min="1" placeholder="Ex: 1000">
        </div>

        <div>
          <label for="tipoPagamento">Tipo de pagamento</label>
          <select id="tipoPagamento" onchange="atualizarResumoPagamento()">
            <option value="limpo">Dinheiro Limpo</option>
            <option value="sujo">Dinheiro Sujo</option>
          </select>
        </div>

        <div>
          <label for="precoLimpo">Valor unitário no limpo</label>
          <input id="precoLimpo" readonly>
        </div>

        <div>
          <label for="precoSujo">Valor unitário no sujo</label>
          <input id="precoSujo" readonly>
        </div>

        <div>
          <label for="obsCompra">Observação</label>
          <input id="obsCompra" readonly>
        </div>
      </div>

      <div id="resumoPagamento" class="warning"></div>
      <div id="fornecedorBarato" class="sugestao"></div>

      <button class="action" onclick="gerarCompra()">Gerar Encomenda</button>
      <button class="action" onclick="copiarCupomCompra()">Copiar Encomenda</button>

      <div id="cupomCompra" class="cupom"></div>
    </div>
  </div>

</div>

<script>
  /* STORAGE */
  let vendas = JSON.parse(localStorage.getItem("fenrir_vendas")) || [];
  let encomendasHistorico = JSON.parse(localStorage.getItem("fenrir_encomendas")) || [];

  /* ELEMENTOS */
  const categoriaEl = document.getElementById("categoria");
  const produtoEl = document.getElementById("produto");
  const orgCompraEl = document.getElementById("orgCompra");
  const qtdCompraEl = document.getElementById("qtdCompra");
  const tipoPagamentoEl = document.getElementById("tipoPagamento");
  const precoLimpoEl = document.getElementById("precoLimpo");
  const precoSujoEl = document.getElementById("precoSujo");
  const obsCompraEl = document.getElementById("obsCompra");
  const fornecedorBaratoEl = document.getElementById("fornecedorBarato");
  const cupomCompraEl = document.getElementById("cupomCompra");
  const resumoPagamentoEl = document.getElementById("resumoPagamento");

  /* ABAS */
  function openTab(tab, btn = null){
    document.querySelectorAll(".tab").forEach(t => t.style.display = "none");
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));

    document.getElementById(tab).style.display = "block";

    if(btn){
      btn.classList.add("active");
    }else{
      const autoBtn = document.querySelector(`.tabs button[data-tab="${tab}"]`);
      if(autoBtn) autoBtn.classList.add("active");
    }

    if(tab === "historico") carregarHistorico();
    if(tab === "ranking") gerarRanking();
    if(tab === "dashboard") gerarDashboard();
    if(tab === "encomendas") {
      atualizarResumoPagamento();
      sugerirFornecedorMaisBarato();
    }
  }

  /* ARMAS */
  const armas = {
    "Colt 1911": { limpo: 10000, sujo: 12500, materiais: { cylinder: 1, components: 1, blueprint: 1 } },
    "HK USP": { limpo: 12000, sujo: 15000, materiais: { cylinder: 1, components: 2, blueprint: 1 } },
    "Desert Eagle": { limpo: 14000, sujo: 17500, materiais: { cylinder: 2, components: 1, blueprint: 1 } }
  };

  /* BANCO ENCOMENDAS */
  const tabelaCompras = {
    municoes: {
      "9mm ou .45": {
        "NINE": { limpo: 25, sujo: null, obs: "Pedido mínimo 1000 munições" },
        "FAMILIA CESARINE": { limpo: 20, sujo: 40, obs: "" }
      },
      ".50 e Doze": {
        "NINE": { limpo: 30, sujo: null, obs: "" },
        "FAMILIA CESARINE": { limpo: 25, sujo: 50, obs: "" }
      },
      "762": {
        "NINE": { limpo: 30, sujo: null, obs: "" },
        "FAMILIA CESARINE": { limpo: 30, sujo: 60, obs: "" }
      }
    },
    drogas: {
      "Coca": {
        "FAMILIES": { limpo: 230, sujo: 460, obs: "Venda média 280$ a 290$" },
        "THUNDERS": { limpo: 300, sujo: 460, obs: "Venda média 280$ a 290$" },
        "DVD": { limpo: 230, sujo: 460, obs: "" },
        "CLOUND": { limpo: 230, sujo: 460, obs: "" },
        "OG's": { limpo: 230, sujo: 380, obs: "Venda média $290 a 300" }
      },
      "Meta": {
        "FAMILIES": { limpo: 230, sujo: 500, obs: "Venda média 315$" },
        "BALLAS": { limpo: 230, sujo: 460, obs: "" }
      },
      "LSD": {
        "DVD": { limpo: 230, sujo: 500, obs: "" },
        "CLOUND": { limpo: 230, sujo: 460, obs: "" },
        "OG's": { limpo: 230, sujo: 380, obs: "Venda média $290 a 300" }
      }
    }
  };

  /* UTIL */
  function dinheiro(valor){
    if(valor === null || valor === undefined || valor === "" || Number.isNaN(Number(valor))){
      return "Indisponível";
    }
    return `$${Number(valor).toLocaleString("pt-BR")}`;
  }

  function dataHoraAtual(){
    return new Date().toLocaleString("pt-BR");
  }

  /* HISTORICO */
  function carregarHistorico(){
    const div = document.getElementById("listaHistorico");

    if(vendas.length === 0 && encomendasHistorico.length === 0){
      div.innerHTML = `<div class="muted">Nenhum registro encontrado.</div>`;
      return;
    }

    let html = "";

    if(vendas.length){
      html += `<h4>Pedidos de armas</h4>`;
      vendas.forEach((v, i) => {
        html += `
          <div class="history">
            <strong>Venda #${String(v.numero).padStart(4,'0')}</strong><br>
            Cliente: ${v.contato}<br>
            Arma: ${v.arma}<br>
            Quantidade: ${v.qtd}<br>
            Pagamento: ${v.pagamento}<br>
            Total: ${dinheiro(v.total)}<br><br>
            <button class="small" onclick="excluirHistorico(${i})">Excluir pedido</button>
          </div>
        `;
      });
    }

    if(encomendasHistorico.length){
      html += `<div class="divider"></div><h4>Encomendas</h4>`;
      encomendasHistorico.forEach((e, i) => {
        html += `
          <div class="history">
            <strong>Encomenda #${String(e.numero).padStart(4,'0')}</strong><br>
            Categoria: ${e.categoria}<br>
            Produto: ${e.produto}<br>
            Fornecedor: ${e.fornecedor}<br>
            Quantidade: ${e.qtd}<br>
            Pagamento: ${e.tipoPagamento}<br>
            Unitário usado: ${dinheiro(e.valorUnitario)}<br>
            Total: ${dinheiro(e.total)}<br>
            Observação: ${e.obs || "-"}<br><br>
            <button class="small" onclick="excluirEncomenda(${i})">Excluir encomenda</button>
          </div>
        `;
      });
    }

    div.innerHTML = html;
  }

  function excluirHistorico(i){
    vendas.splice(i, 1);
    localStorage.setItem("fenrir_vendas", JSON.stringify(vendas));
    carregarHistorico();
    gerarDashboard();
    gerarRanking();
  }

  function excluirEncomenda(i){
    encomendasHistorico.splice(i, 1);
    localStorage.setItem("fenrir_encomendas", JSON.stringify(encomendasHistorico));
    carregarHistorico();
    gerarDashboard();
  }

  /* CARREGAMENTO */
  function calcularCarregamento(caixas){
    let grande = Math.floor(caixas / 15);
    let resto = caixas % 15;

    let medio = Math.floor(resto / 10);
    resto = resto % 10;

    let pequeno = Math.ceil(resto / 5);

    return { grande, medio, pequeno };
  }

  /* PEDIDOS */
  function gerarPedido(){
    let contato = document.getElementById("contato").value.trim();
    let armaNome = document.getElementById("arma").value;
    let qtd = Number(document.getElementById("qtd").value);
    let pagamento = document.getElementById("pagamento").value;

    if(!contato){
      alert("Preencha o contato.");
      return;
    }

    if(!qtd || qtd <= 0){
      alert("Informe uma quantidade válida.");
      return;
    }

    let arma = armas[armaNome];
    let preco = pagamento === "Limpo" ? arma.limpo : arma.sujo;
    let total = qtd * preco;

    let desconto = false;
    if(qtd >= 11){
      total = total * 0.9;
      desconto = true;
    }

    let cylinder = qtd * arma.materiais.cylinder;
    let components = qtd * arma.materiais.components;
    let blueprint = qtd * arma.materiais.blueprint;

    let caixas = Math.max(cylinder, components, blueprint);
    let carreg = calcularCarregamento(caixas);

    let textoCarreg = "";
    if(carreg.grande > 0) textoCarreg += `${carreg.grande} Grande `;
    if(carreg.medio > 0) textoCarreg += `${carreg.medio} Médio `;
    if(carreg.pequeno > 0) textoCarreg += `${carreg.pequeno} Pequeno`;

    let numero = vendas.length + 1;

    let cupom = 
`VENDA #${String(numero).padStart(4,'0')}

Contato: ${contato}
Data: ${dataHoraAtual()}
Tipo de Pagamento: Dinheiro ${pagamento}

Pedido:
${qtd} ${armaNome} → ${dinheiro(preco)} (cada)

${desconto ? "Desconto aplicado: 10%\n" : ""}Total do Pedido: ${dinheiro(Math.round(total))}

Materiais Necessários:
${cylinder} Cylinder
${components} Componente
${blueprint} Blueprint

Carregamento recomendado: ${textoCarreg || "Não calculado"}`;

    document.getElementById("cupom").innerText = cupom;

    vendas.push({
      numero,
      contato,
      arma: armaNome,
      qtd,
      pagamento,
      total: Math.round(total),
      data: dataHoraAtual()
    });

    localStorage.setItem("fenrir_vendas", JSON.stringify(vendas));
    gerarDashboard();
    gerarRanking();
  }

  function copiarCupom(){
    const texto = document.getElementById("cupom").innerText.trim();
    if(!texto){
      alert("Gere um cupom primeiro.");
      return;
    }
    navigator.clipboard.writeText(texto);
    alert("Cupom copiado.");
  }

  /* RANKING */
  function gerarRanking(){
    let ranking = {};

    vendas.forEach(v => {
      if(!ranking[v.contato]) ranking[v.contato] = 0;
      ranking[v.contato] += v.total;
    });

    let lista = Object.entries(ranking).sort((a, b) => b[1] - a[1]);
    let div = document.getElementById("rankingClientes");

    if(lista.length === 0){
      div.innerHTML = `<div class="muted">Sem vendas registradas para gerar ranking.</div>`;
      return;
    }

    div.innerHTML = "";
    lista.forEach((c, i) => {
      div.innerHTML += `
        <div class="history">
          <strong>${i + 1}º ${c[0]}</strong><br>
          Total movimentado: ${dinheiro(c[1])}
        </div>
      `;
    });
  }

  /* DASHBOARD */
  function gerarDashboard(){
    const relatorio = document.getElementById("relatorio");

    const totalVendas = vendas.length;
    const faturamento = vendas.reduce((acc, v) => acc + v.total, 0);
    const ticketMedio = totalVendas ? Math.round(faturamento / totalVendas) : 0;

    const totalEncomendas = encomendasHistorico.length;
    const gastoEncomendas = encomendasHistorico.reduce((acc, e) => acc + e.total, 0);

    let armasVendidas = {};
    vendas.forEach(v => {
      armasVendidas[v.arma] = (armasVendidas[v.arma] || 0) + v.qtd;
    });

    let armaTop = "Nenhuma";
    let maiorQtd = 0;
    Object.entries(armasVendidas).forEach(([arma, qtd]) => {
      if(qtd > maiorQtd){
        maiorQtd = qtd;
        armaTop = arma;
      }
    });

    relatorio.innerHTML = `
      <div class="stats">
        <div class="stat">
          <div class="title">Total de vendas</div>
          <div class="value">${totalVendas}</div>
        </div>

        <div class="stat">
          <div class="title">Faturamento</div>
          <div class="value">${dinheiro(faturamento)}</div>
        </div>

        <div class="stat">
          <div class="title">Ticket médio</div>
          <div class="value">${dinheiro(ticketMedio)}</div>
        </div>

        <div class="stat">
          <div class="title">Arma mais vendida</div>
          <div class="value" style="font-size:18px">${armaTop}</div>
        </div>

        <div class="stat">
          <div class="title">Encomendas feitas</div>
          <div class="value">${totalEncomendas}</div>
        </div>

        <div class="stat">
          <div class="title">Gasto em encomendas</div>
          <div class="value">${dinheiro(gastoEncomendas)}</div>
        </div>
      </div>
    `;
  }

  /* ENCOMENDAS */
  function carregarProdutos(){
    const cat = categoriaEl.value;

    produtoEl.innerHTML = `<option value="">Selecionar</option>`;
    orgCompraEl.innerHTML = `<option value="">Selecione o produto primeiro</option>`;
    precoLimpoEl.value = "";
    precoSujoEl.value = "";
    obsCompraEl.value = "";
    fornecedorBaratoEl.innerText = "";
    resumoPagamentoEl.innerText = "";
    cupomCompraEl.innerText = "";

    if(!cat) return;

    Object.keys(tabelaCompras[cat]).forEach(prod => {
      produtoEl.innerHTML += `<option value="${prod}">${prod}</option>`;
    });
  }

  function carregarFornecedores(){
    const cat = categoriaEl.value;
    const prod = produtoEl.value;

    orgCompraEl.innerHTML = `<option value="">Selecionar</option>`;
    precoLimpoEl.value = "";
    precoSujoEl.value = "";
    obsCompraEl.value = "";
    fornecedorBaratoEl.innerText = "";
    resumoPagamentoEl.innerText = "";
    cupomCompraEl.innerText = "";

    if(!cat || !prod) return;

    Object.keys(tabelaCompras[cat][prod]).forEach(org => {
      orgCompraEl.innerHTML += `<option value="${org}">${org}</option>`;
    });

    sugerirFornecedorMaisBarato();
  }

  function preencherValores(){
    const cat = categoriaEl.value;
    const prod = produtoEl.value;
    const org = orgCompraEl.value;

    if(!cat || !prod || !org) return;

    const d = tabelaCompras[cat][prod][org];

    precoLimpoEl.value = d.limpo != null ? dinheiro(d.limpo) : "Indisponível";
    precoSujoEl.value = d.sujo != null ? dinheiro(d.sujo) : "Indisponível";
    obsCompraEl.value = d.obs || "-";

    atualizarResumoPagamento();
    sugerirFornecedorMaisBarato();
  }

  function atualizarResumoPagamento(){
    const cat = categoriaEl.value;
    const prod = produtoEl.value;
    const org = orgCompraEl.value;
    const tipo = tipoPagamentoEl.value;

    if(!cat || !prod || !org){
      resumoPagamentoEl.innerText = "";
      return;
    }

    const d = tabelaCompras[cat][prod][org];
    const valorEscolhido = tipo === "limpo" ? d.limpo : d.sujo;

    if(valorEscolhido == null){
      resumoPagamentoEl.innerText = `⚠️ Este fornecedor não possui valor em dinheiro ${tipo}.`;
    }else{
      resumoPagamentoEl.innerHTML = `<span class="ok">✔</span> Pagamento selecionado: ${tipo.toUpperCase()} → ${dinheiro(valorEscolhido)} por unidade.`;
    }
  }

  function sugerirFornecedorMaisBarato(){
    const cat = categoriaEl.value;
    const prod = produtoEl.value;

    if(!cat || !prod){
      fornecedorBaratoEl.innerText = "";
      return;
    }

    const fornecedores = tabelaCompras[cat][prod];
    let melhorLimpo = null;
    let melhorSujo = null;

    Object.entries(fornecedores).forEach(([nome, dados]) => {
      if(dados.limpo != null){
        if(!melhorLimpo || dados.limpo < melhorLimpo.valor){
          melhorLimpo = { nome, valor: dados.limpo };
        }
      }

      if(dados.sujo != null){
        if(!melhorSujo || dados.sujo < melhorSujo.valor){
          melhorSujo = { nome, valor: dados.sujo };
        }
      }
    });

    let texto = "";
    if(melhorLimpo){
      texto += `Mais barato no limpo: ${melhorLimpo.nome} (${dinheiro(melhorLimpo.valor)})`;
    }
    if(melhorSujo){
      texto += `${texto ? " | " : ""}Mais barato no sujo: ${melhorSujo.nome} (${dinheiro(melhorSujo.valor)})`;
    }

    fornecedorBaratoEl.innerText = texto;
  }

  function gerarCompra(){
    const cat = categoriaEl.value;
    const prod = produtoEl.value;
    const org = orgCompraEl.value;
    const qtd = Number(qtdCompraEl.value);
    const tipo = tipoPagamentoEl.value;

    if(!cat){
      alert("Selecione uma categoria.");
      return;
    }

    if(!prod){
      alert("Selecione um produto.");
      return;
    }

    if(!org){
      alert("Selecione um fornecedor.");
      return;
    }

    if(!qtd || qtd <= 0){
      alert("Informe uma quantidade válida.");
      return;
    }

    const dados = tabelaCompras[cat][prod][org];
    const valorUnitario = tipo === "limpo" ? dados.limpo : dados.sujo;

    if(valorUnitario == null){
      alert(`Esse fornecedor não possui preço em dinheiro ${tipo}.`);
      return;
    }

    if(cat === "municoes" && org === "NINE" && prod === "9mm ou .45" && qtd < 1000){
      alert("Para esse item com a NINE, o pedido mínimo é 1000 munições.");
      return;
    }

    const total = qtd * valorUnitario;
    const numero = encomendasHistorico.length + 1;

    const cupom =
`ENCOMENDA #${String(numero).padStart(4,'0')}

Data: ${dataHoraAtual()}
Categoria: ${cat === "municoes" ? "Munições" : "Drogas"}
Produto: ${prod}
Fornecedor: ${org}
Quantidade: ${qtd}

Valores unitários:
- Limpo: ${dados.limpo != null ? dinheiro(dados.limpo) : "Indisponível"}
- Sujo: ${dados.sujo != null ? dinheiro(dados.sujo) : "Indisponível"}

Pagamento selecionado: ${tipo.toUpperCase()}
Valor unitário usado: ${dinheiro(valorUnitario)}
Total da compra: ${dinheiro(total)}

Observação: ${dados.obs || "-"}`;

    cupomCompraEl.innerText = cupom;

    encomendasHistorico.push({
      numero,
      categoria: cat === "municoes" ? "Munições" : "Drogas",
      produto: prod,
      fornecedor: org,
      qtd,
      tipoPagamento: tipo.toUpperCase(),
      valorUnitario,
      total,
      obs: dados.obs || "",
      data: dataHoraAtual()
    });

    localStorage.setItem("fenrir_encomendas", JSON.stringify(encomendasHistorico));
    gerarDashboard();
  }

  function copiarCupomCompra(){
    const texto = cupomCompraEl.innerText.trim();
    if(!texto){
      alert("Gere uma encomenda primeiro.");
      return;
    }
    navigator.clipboard.writeText(texto);
    alert("Encomenda copiada.");
  }

  /* INICIO */
  window.onload = () => {
    openTab("pedidos");
    carregarHistorico();
    gerarDashboard();
    gerarRanking();
  };
</script>
